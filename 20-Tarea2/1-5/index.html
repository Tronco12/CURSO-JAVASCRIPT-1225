<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .base{
            display: flex;
            background-color: #244D87;
            padding: 30px;
            justify-content: space-around;
            align-items: center;
        }


        .productos{
            display: flex;
            justify-content: space-around;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
            font-size: large;
            background-color: aliceblue;
        }

        .precio{
            display: flex;
            justify-content: space-around;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
            font-size: large;
            background-color: blanchedalmond;
        }

        .imagen{
            display: flex;
            justify-content: space-around;
            margin: 10px;
            padding: 100px;
            border-radius: 15px;
            font-size: small;
        }

        .leche{
            background-color: aqua;
        }

        .cereal{
            background-color: aquamarine;
        }

        .tomates{
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <div class="base">
        <div class="leche">
        <div class="productos">Leche</div>
        <div class="precio">Q15.00</div>
        <img src="Leche.png" alt="Leche" class="imagen" width="200px">
        </div>
        <div class="cereal">
            <div class="productos">Cereal</div>
            <div class="precio">Q20.00</div>
            <img src="Cereal.png" alt="Caja de cereal" class="imagen" width="200px">
        </div>
        <div class="tomates">
            <div class="productos">Tomates en lata</div>
            <div class="precio">Q12.00</div>
            <img src="Tomates en lata.png" class="imagen" alt="Tomates en lata" width="200px">
        </div>
    </div>
</div>
</html>
