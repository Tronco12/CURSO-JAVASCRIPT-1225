<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Vertical</title>
    <style>
        .contenedor{
            display: flex;
            justify-content: space-around;
            flex-direction: column;
            background-color: beige;
            padding: 10px;
            margin: 25px;
            padding: 5px;
            border-radius: 15px;

        }
        
        .nav-link{
            display: flex;
            justify-content: space-around;
            flex-direction: column;
            background-color: aquamarine;
            margin: 10px 5px;
            margin-top: 5px;
            border-radius: 5px;
        }

        .nav-link a:hover{
            color: red;
            text-decoration: underline;
        }

        .nav-link a{
            margin: 10px;
            border-radius: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="nav-link">
            <a href="https//www.youtube.com ">Youtube</a>
        </div>
    </div>
    <div class="contenedor">
        <div class="nav-link">
            <a href="https.www.google.com">Google</a>
        </div>
    </div>
    <div class="contenedor">
        <div class="nav-link">
            <a href="https.www.instagram.com">Instagram</a>
        </div>
    </div>
</body>
</html>
