<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asincronía</title>
</head>
<body>
    <script>
        console.log("Inicio del código sincronico");

        setTimeout(function(){
            for(let i=0; i<100; i++){
                console.log(i);
            }
        },0);

        console.log("Fin del código sincronico")
    </script>
</body>
</html>
