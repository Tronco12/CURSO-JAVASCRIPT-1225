<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contenedor{
            background-color: grey;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 200px;
        }

        .imagen{
            background-color: none;
            display: flex;
            justify-content: space-between;
            border-radius: 5px;
        }

        p{
            align-items: center;
            display: flex;
            justify-content: space-around;
            
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="imagen">
            <p>Copyrigth 2025 Academia Fibonacci _</p>
            <img src="Facebook.png" alt="Logotipo de Facebook" class="imagen" width="100px">
        </div>
        <div class="imagen">
            <img src="Instagram.png" alt="Logotipo de Instagram" class="imagen" width="100px">
        </div>
        <div class="imagen">
            <img src="Twitter.png" alt="Logotipo de Twitter" class="imagen" width="100px">
        </div>
        <div class="imagen">
            <img src="In.png" alt="Logotipo de In" class="imagen" width="100px">
        </div>
    </div>
</body>
</html>
