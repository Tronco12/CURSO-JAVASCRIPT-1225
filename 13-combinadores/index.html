<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinadores</title>
    <style>
        /* Selector Descendiente (espacio)*/
        .contenedor{
            color: green;
        }
        ol > li{
            font-weight: bolder;
        }
        h2 ~ h3{
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <h1>Titulo principal</h1>
    <h3>Subtitulo menor</h3>
    <h2>Subtitulo</h2>
    <h3>Subtitulo menor 1</h3>
    <div class="contenedor">
        <p>Este parrafo esta dentro de la etiqueta div</p>
        <p>Este tambien</p>
    </div>
    <h3>Subtitulo menor 2</h3>
    <p>Este NO esta dentro de div</p>
    <ol>
        <li>Primer Elemento</li>
        <li>Segundo Elemento</li>
        <ul>
            <li>Elemento interno uno</li>
            <li>Elemento interno dos</li>
        </ul>
        <li>Tercer Elemento</li>
    </ol>
</body>
</html>
