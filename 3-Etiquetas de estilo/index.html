<body>
    <p>Esta <em>palabra</em>  tiene enfasis</p>
    <p>Esta <i>palabra </i>tiene cursiva</p>

    <p>Esta <del>palabra</del> esta tachada</p>
    <p>Esta <ins>palabra</ins> esta incertada</p>
    <p>esta <u>palabra</u> esta subrallada</p>
    <p>Esta <mark>palabra</mark> esta marcada</p>
