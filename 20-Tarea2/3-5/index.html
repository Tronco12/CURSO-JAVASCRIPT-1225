<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de imagenes</title>
    <style>
        .imagen{
            background-color: antiquewhite;
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin: 25px;
        }
        .imagen:hover{
            margin: 20px 20px;
            background-color: lightcoral;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="imagen">
        <img src="VG.png"  class="imagen" alt="Van Gogh" width="300px">
    </div>
    <div class="imagen">
        <img src="Arte1.png" alt="Pintura" class="imagen" width="300px">
    </div>
    <div class="imagen">
        <img src="Arte 2.png" alt="Pintura" class="imagen" width="300px">
    </div>
    <div class="imagen">
        <img src="Arte 3.png" alt="Pintura" class="imagen" width="300px">
    </div>
    <div class="imagen">
        <img src="Arte 4.png" alt="Pintura" class="imagen" width="300px">
    </div>
    <div class="imagen">
        <img src="Arte 5.png" alt="Pintura" class="imagen" width="300px">
    </div>
</body>
</html>
